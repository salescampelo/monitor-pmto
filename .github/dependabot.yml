version: 2
updates:
  # NPM dependencies
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "America/Sao_Paulo"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "automated"
    commit-message:
      prefix: "chore(deps)"
    # Lock to patch + minor only. Major bumps must be initiated manually
    # after compatibility review (lesson from vite 5->8 cascade, Apr 2026).
    ignore:
      - dependency-name: "*"
        update-types:
          - "version-update:semver-major"
    groups:
      production:
        dependency-type: "production"
        update-types:
          - "minor"
          - "patch"
      development:
        dependency-type: "development"
        update-types:
          - "minor"
          - "patch"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "ci"
      - "automated"
    commit-message:
      prefix: "chore(ci)"
    # Same policy: no major bumps without review.
    ignore:
      - dependency-name: "*"
        update-types:
          - "version-update:semver-major"
