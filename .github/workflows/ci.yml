name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  audit-and-build:
    name: Audit & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Security audit (high+)
        run: npm audit --production --audit-level=high

      - name: Unit tests
        run: npm test

      - name: Build
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_CANDIDATE_USERNAME: ${{ secrets.VITE_CANDIDATE_USERNAME }}
