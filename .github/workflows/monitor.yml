name: Executar Monitor PMTO

on:
  schedule:
    - cron: '0 10,22 * * *' # Executa às 07:00 e 19:00 no horário de Brasília (UTC-3)
  workflow_dispatch: # Permite rodar manualmente clicando num botão

jobs:
  run-scraper:
    runs-on: ubuntu-latest
    steps:
      - name: Baixar o código
        uses: actions/checkout@v3

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Instalar dependências
        run: pip install -r requirements.txt

      - name: Rodar o Scraper
        env:
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          NOTIFY_TO: ${{ secrets.NOTIFY_TO }}
        run: python pmto_monitor.py

      - name: Salvar novos dados no repositório
        run: |
          git config --global user.name "Robô Monitor"
          git config --global user.email "bot@monitor.com"
          git add data/mention_history.json data/seen_articles.json
          git commit -m "Atualização automática de menções" || echo "Sem mudanças"
          git push
